\* TLC model configuration: 3 namespaces, MaxKeyVersion=2
\*
\* Tests whether 3 concurrent registry writers can exhaust
\* each other's retries permanently. Reduced MaxKeyVersion
\* to keep state space tractable (no double-rotation).
\*
\* Run with:
\*   tlc CeSigningReconciler.tla -config CeSigningReconciler-3ns.cfg -workers auto

CONSTANTS
    Namespaces     = {"alice", "bob", "eve"}
    MaxKeyVersion  = 2
    MaxRegistryRetries = 3

INVARIANT
    Safety

PROPERTY
    LabelEventuallyConsumed
    CacheEventuallyConverges

SPECIFICATION
    Spec
