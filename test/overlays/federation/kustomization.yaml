apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../local
patches:
  - target:
      group: ce-signing.platform.io
      version: v1alpha1
      kind: CloudEventSigningConsumerPolicy
      name: bob-verification-policy
    patch: |-
      - op: add
        path: /spec/trustedSources/-
        value:
          cluster: remote
          namespace: bu-remote-alice
