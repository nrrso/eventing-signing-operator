apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../manifests
patches:
  - target:
      group: ce-signing.platform.io
      version: v1alpha1
      kind: CloudEventSigningProducerPolicy
      name: alice-signing-policy
    patch: |-
      - op: replace
        path: /spec/proxy/image
        value: localhost:5001/public/ce-signing-proxy:dev
  - target:
      group: ce-signing.platform.io
      version: v1alpha1
      kind: CloudEventSigningProducerPolicy
      name: eve-signing-policy
    patch: |-
      - op: replace
        path: /spec/proxy/image
        value: localhost:5001/public/ce-signing-proxy:dev
  - target:
      group: ce-signing.platform.io
      version: v1alpha1
      kind: CloudEventSigningConsumerPolicy
      name: bob-verification-policy
    patch: |-
      - op: replace
        path: /spec/proxy/image
        value: localhost:5001/public/ce-signing-proxy:dev
  - target:
      group: ce-signing.platform.io
      version: v1alpha1
      kind: CloudEventSigningConsumerPolicy
      name: eve-verification-policy
    patch: |-
      - op: replace
        path: /spec/proxy/image
        value: localhost:5001/public/ce-signing-proxy:dev
