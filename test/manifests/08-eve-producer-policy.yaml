apiVersion: ce-signing.platform.io/v1alpha1
kind: CloudEventSigningProducerPolicy
metadata:
  name: eve-signing-policy
  namespace: bu-eve
  labels:
    app.kubernetes.io/part-of: ce-signing-test
spec:
  canonicalAttributes:
    - type
    - source
    - subject
    - datacontenttype
  producers:
    - name: eve-event-source
      reply:
        ref:
          apiVersion: eventing.knative.dev/v1
          kind: Broker
          name: eve-broker
          namespace: bu-eve
  proxy:
    image: ghcr.io/nrrso/ce-signing-proxy:a6d4ad32
    resources:
      limits:
        cpu: 250m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 256Mi
    replicas: 1
    hpa:
      enabled: false
    topologySpreadConstraints:
      enabled: false
    env:
      CE_SIGNING_LOG_LEVEL: DEBUG
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://tempo.monitoring:4317"
      QUARKUS_OTEL_SDK_DISABLED: "true"
  keyRotation:
    enabled: false
