apiVersion: ce-signing.platform.io/v1alpha1
kind: CloudEventSigningConsumerPolicy
metadata:
  name: eve-verification-policy
  namespace: bu-eve
  labels:
    app.kubernetes.io/part-of: ce-signing-test
spec:
  trustedSources:
    - cluster: local
      namespace: bu-alice
  rejectUnsigned: true
  consumers:
    - name: alice-event-consumer
      broker: eve-broker
      filter:
        type: dev.ce-signing.alice.produced
      subscriber:
        ref:
          apiVersion: v1
          kind: Service
          name: event-display
  proxy:
    image: ghcr.io/nrrso/ce-signing-proxy:a6d4ad32
    resources:
      limits:
        cpu: 250m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 256Mi
    replicas: 1
    hpa:
      enabled: false
    env:
      CE_SIGNING_LOG_LEVEL: DEBUG
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://tempo.monitoring:4317"
      QUARKUS_OTEL_SDK_DISABLED: "true"
