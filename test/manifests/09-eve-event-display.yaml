apiVersion: apps/v1
kind: Deployment
metadata:
  name: event-display
  namespace: bu-eve
  labels:
    app: event-display
    app.kubernetes.io/part-of: ce-signing-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: event-display
  template:
    metadata:
      labels:
        app: event-display
        app.kubernetes.io/part-of: ce-signing-test
    spec:
      containers:
        - name: event-display
          image: gcr.io/knative-releases/knative.dev/eventing/cmd/event_display
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: event-display
  namespace: bu-eve
  labels:
    app: event-display
    app.kubernetes.io/part-of: ce-signing-test
spec:
  selector:
    app: event-display
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
