# Mode: "sign" or "verify"
ce-signing.mode=${CE_SIGNING_MODE:sign}
# Signing mode: key paths
ce-signing.private-key-path=${CE_SIGNING_PRIVATE_KEY_PATH:/var/run/ce-keys/private.pem}
ce-signing.key-id=${CE_SIGNING_KEY_ID:default}
# Cluster identity
ce-signing.cluster-name=${CE_CLUSTER_NAME:local}
# Signing mode: canonical attributes
ce-signing.canonical-attributes=${CE_SIGNING_CANONICAL_ATTRS:type,source,subject,datacontenttype}
# Verify mode: cluster-aware trust
ce-signing.verify.trusted-sources=${CE_SIGNING_TRUSTED_SOURCES:}
ce-signing.verify.reject-unsigned=${CE_SIGNING_REJECT_UNSIGNED:true}
# Server
quarkus.http.port=${CE_SIGNING_PORT:8090}
quarkus.http.idle-timeout=30s
# Observability
quarkus.micrometer.export.prometheus.enabled=true
quarkus.micrometer.binder.http-server.enabled=true
quarkus.otel.exporter.otlp.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
quarkus.otel.service.name=${OTEL_SERVICE_NAME:ce-signing-proxy}
quarkus.otel.resource.attributes=${OTEL_RESOURCE_ATTRIBUTES:}
quarkus.otel.sdk.disabled=${QUARKUS_OTEL_SDK_DISABLED:true}
quarkus.log.level=INFO
quarkus.log.category."com.platform.cesigning".level=${CE_SIGNING_LOG_LEVEL:INFO}
# Index CloudEvents JAX-RS providers for RESTEasy Reactive discovery
quarkus.index-dependency.cloudevents-restful-ws.group-id=io.cloudevents
quarkus.index-dependency.cloudevents-restful-ws.artifact-id=cloudevents-http-restful-ws-jakarta
# Health
quarkus.smallrye-health.root-path=/health
quarkus.smallrye-health.extensions.enabled=true
# Container Image (Jib)
quarkus.container-image.build=false
quarkus.container-image.group=nrrso
quarkus.container-image.name=ce-signing-proxy
quarkus.jib.base-jvm-image=registry.access.redhat.com/ubi9/openjdk-21-runtime
quarkus.jib.environment-variables.CE_SIGNING_MODE=sign
quarkus.jib.environment-variables.CE_SIGNING_PORT=8090
quarkus.jib.environment-variables.CE_SIGNING_PRIVATE_KEY_PATH=/var/run/ce-keys/private.pem
quarkus.jib.environment-variables.CE_SIGNING_KEY_ID=default
