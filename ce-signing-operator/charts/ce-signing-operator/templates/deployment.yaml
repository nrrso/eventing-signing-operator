{{- if not .Values.clusterName }}
{{- fail "clusterName is required. Set it via --set clusterName=<name>" }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ce-signing-operator
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ce-signing-operator.labels" . | nindent 4 }}
    app.kubernetes.io/component: operator
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: /q/metrics
    prometheus.io/port: "8080"
    prometheus.io/scheme: http
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "ce-signing-operator.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: operator
  template:
    metadata:
      labels:
        {{- include "ce-signing-operator.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: operator
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /q/metrics
        prometheus.io/port: "8080"
        prometheus.io/scheme: http
    spec:
      serviceAccountName: ce-signing-operator
      securityContext:
        runAsNonRoot: true
      containers:
        - name: ce-signing-operator
          image: {{ .Values.image }}
          imagePullPolicy: Always
          env:
            - name: KUBERNETES_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: CE_SIGNING_NAMESPACE
              value: {{ .Release.Namespace | quote }}
            - name: CE_CLUSTER_NAME
              value: {{ .Values.clusterName | quote }}
            - name: OPERATOR_MODE
              value: "LOCAL"
            - name: CE_SIGNING_PROXY_IMAGE
              value: {{ .Values.proxyImage | quote }}
            - name: CE_SIGNING_LOG_LEVEL
              value: {{ .Values.logLevel | quote }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.otel.endpoint | quote }}
            - name: OTEL_SERVICE_NAME
              value: {{ .Values.otel.serviceName | quote }}
            - name: QUARKUS_OPERATOR_SDK_CONTROLLERS_PRODUCERPOLICYRECONCILER_NAMESPACES
              value: "JOSDK_ALL_NAMESPACES"
            - name: QUARKUS_OPERATOR_SDK_CONTROLLERS_CONSUMERPOLICYRECONCILER_NAMESPACES
              value: "JOSDK_ALL_NAMESPACES"
            - name: QUARKUS_OPERATOR_SDK_CONTROLLERS_KEY_ROTATION_CONTROLLER_NAMESPACES
              value: "JOSDK_ALL_NAMESPACES"
            - name: QUARKUS_OPERATOR_SDK_CONTROLLERS_FEDERATION_CONTROLLER_NAMESPACES
              value: "JOSDK_ALL_NAMESPACES"
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          startupProbe:
            httpGet:
              path: /health/started
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
