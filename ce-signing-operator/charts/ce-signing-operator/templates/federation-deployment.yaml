{{- if .Values.federation.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-federation
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ce-signing-operator.labels" . | nindent 4 }}
    app.kubernetes.io/component: federation
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "ce-signing-operator.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: federation
  template:
    metadata:
      labels:
        {{- include "ce-signing-operator.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: federation
    spec:
      serviceAccountName: {{ .Release.Name }}-federation
      containers:
        - name: federation-controller
          image: {{ .Values.image }}
          env:
            - name: OPERATOR_MODE
              value: "FEDERATION"
            - name: CE_CLUSTER_NAME
              value: {{ .Values.clusterName | quote }}
            - name: CE_SIGNING_NAMESPACE
              value: {{ .Release.Namespace | quote }}
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            {{- toYaml .Values.federation.resources | nindent 12 }}
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
{{- end }}
