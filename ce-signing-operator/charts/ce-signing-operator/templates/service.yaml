apiVersion: v1
kind: Service
metadata:
  name: ce-signing-operator
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ce-signing-operator.labels" . | nindent 4 }}
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: /q/metrics
    prometheus.io/port: "8080"
    prometheus.io/scheme: http
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      protocol: TCP
      targetPort: 8080
  selector:
    {{- include "ce-signing-operator.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: operator
