# Operator configuration
quarkus.operator-sdk.crd.apply=false

# Observability
quarkus.micrometer.export.prometheus.enabled=true
quarkus.otel.exporter.otlp.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
quarkus.otel.service.name=${OTEL_SERVICE_NAME:ce-signing-operator}
quarkus.otel.sdk.disabled=true

quarkus.log.level=INFO
quarkus.log.category."com.platform.cesigning".level=${CE_SIGNING_LOG_LEVEL:INFO}

# Health
quarkus.smallrye-health.root-path=/health
quarkus.health.extensions.enabled=true

# Container Image (Jib)
quarkus.container-image.build=false
quarkus.container-image.group=nrrso
quarkus.container-image.name=ce-signing-operator
quarkus.jib.base-jvm-image=registry.access.redhat.com/ubi9/openjdk-21-runtime

# Kubernetes manifest generation
quarkus.kubernetes.deployment-target=kubernetes
quarkus.kubernetes.name=ce-signing-operator
quarkus.kubernetes.namespace=${CE_SIGNING_NAMESPACE:ce-signing-system}
quarkus.kubernetes.replicas=1
quarkus.kubernetes.service-account=ce-signing-operator
quarkus.kubernetes.ports."http".container-port=8080
quarkus.kubernetes.resources.requests.cpu=500m
quarkus.kubernetes.resources.requests.memory=256Mi
quarkus.kubernetes.resources.limits.cpu=2000m
quarkus.kubernetes.resources.limits.memory=2Gi
quarkus.kubernetes.readiness-probe.http-action-path=/health/ready
quarkus.kubernetes.readiness-probe.http-action-port-name=http
quarkus.kubernetes.readiness-probe.initial-delay=5s
quarkus.kubernetes.readiness-probe.period=10s
quarkus.kubernetes.liveness-probe.http-action-path=/health/live
quarkus.kubernetes.liveness-probe.http-action-port-name=http
quarkus.kubernetes.liveness-probe.initial-delay=10s
quarkus.kubernetes.liveness-probe.period=30s
quarkus.kubernetes.security-context.run-as-non-root=true
quarkus.kubernetes.security-context.read-only-root-filesystem=true

# Proxy image (used by operator when creating signing/verifying Deployments)
cesigning.proxy.image=${CE_SIGNING_PROXY_IMAGE:ghcr.io/nrrso/ce-signing-proxy:latest}

# Helm chart generation
quarkus.helm.name=ce-signing-operator
quarkus.helm.description=CloudEvent signing operator for Kubernetes/Knative
quarkus.helm.values."app.namespace".paths=metadata.namespace
quarkus.helm.values."app.proxyImage".property=cesigning.proxy.image
quarkus.helm.values."app.proxyImage".value=${CE_SIGNING_PROXY_IMAGE:ghcr.io/nrrso/ce-signing-proxy:latest}
