apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: publickeyregistries.ce-signing.platform.io
spec:
  group: ce-signing.platform.io
  scope: Cluster
  names:
    plural: publickeyregistries
    singular: publickeyregistry
    kind: PublicKeyRegistry
    shortNames: [cepkr]
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                entries:
                  type: array
                  items:
                    type: object
                    required: [cluster, namespace, keyId, publicKeyPEM]
                    properties:
                      cluster:
                        type: string
                        description: "Cluster name that owns this key"
                      namespace:
                        type: string
                        description: "Namespace of the CloudEventSigningProducerPolicy"
                      keyId:
                        type: string
                        description: "Unique key identifier (e.g. bu-alice-v1)"
                      publicKeyPEM:
                        type: string
                        description: "PEM-encoded Ed25519 public key"
                      algorithm:
                        type: string
                        default: ed25519
                      createdAt:
                        type: string
                        format: date-time
                      expiresAt:
                        type: string
                        format: date-time
                      status:
                        type: string
                        enum: [active, rotating, expired]
                        default: active
      additionalPrinterColumns:
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
