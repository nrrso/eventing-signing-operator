apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: cloudeventsigningconsumerpolicies.ce-signing.platform.io
spec:
  group: ce-signing.platform.io
  scope: Namespaced
  names:
    plural: cloudeventsigningconsumerpolicies
    singular: cloudeventsigningconsumerpolicy
    kind: CloudEventSigningConsumerPolicy
    shortNames: [cescp]
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                trustedNamespaces:
                  type: array
                  items:
                    type: string
                rejectUnsigned:
                  type: boolean
                  default: true
                consumers:
                  type: array
                  items:
                    type: object
                    required: [name, broker]
                    properties:
                      name:
                        type: string
                      broker:
                        type: string
                      brokerNamespace:
                        type: string
                      filter:
                        type: object
                        additionalProperties:
                          type: string
                      subscriber:
                        type: object
                        properties:
                          ref:
                            type: object
                            properties:
                              apiVersion:
                                type: string
                              kind:
                                type: string
                              name:
                                type: string
                              namespace:
                                type: string
                proxy:
                  type: object
                  properties:
                    image:
                      type: string
                      default: "ghcr.io/nrrso/ce-signing-proxy:latest"
                    replicas:
                      type: integer
                      default: 2
                    resources:
                      type: object
                      properties:
                        requests:
                          type: object
                          properties:
                            cpu: { type: string, default: "50m" }
                            memory: { type: string, default: "64Mi" }
                        limits:
                          type: object
                          properties:
                            cpu: { type: string, default: "200m" }
                            memory: { type: string, default: "128Mi" }
                    hpa:
                      type: object
                      properties:
                        enabled: { type: boolean, default: true }
                        minReplicas: { type: integer, default: 2 }
                        maxReplicas: { type: integer, default: 10 }
                        targetCPUUtilization: { type: integer, default: 70 }
                    env:
                      type: object
                      description: Additional environment variables to pass to the proxy container
                      additionalProperties:
                        type: string
            status:
              type: object
              properties:
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type: { type: string }
                      status: { type: string, enum: ["True", "False", "Unknown"] }
                      reason: { type: string }
                      message: { type: string }
                      lastTransitionTime: { type: string, format: date-time }
                consumers:
                  type: array
                  items:
                    type: object
                    properties:
                      name: { type: string }
                      triggersReady: { type: boolean }
                lastReconciled: { type: string, format: date-time }
                observedGeneration: { type: integer }
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Ready
          type: string
          jsonPath: ".status.conditions[?(@.type=='Ready')].status"
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
