{{- if .Values.federation.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-federation
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: ce-signing-operator
    app.kubernetes.io/component: federation
    app.kubernetes.io/managed-by: helm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ce-signing-operator
      app.kubernetes.io/component: federation
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ce-signing-operator
        app.kubernetes.io/component: federation
    spec:
      serviceAccountName: {{ .Release.Name }}-federation
      containers:
        - name: federation-controller
          image: {{ .Values.app.image | default (printf "ghcr.io/nrrso/ce-signing-operator:%s" .Chart.AppVersion) }}
          env:
            - name: OPERATOR_MODE
              value: "FEDERATION"
            - name: CE_CLUSTER_NAME
              value: {{ .Values.app.clusterName | quote }}
            - name: CE_SIGNING_NAMESPACE
              value: {{ .Release.Namespace | quote }}
            - name: QUARKUS_OPERATOR_SDK_CONTROLLERS_PRODUCERPOLICYRECONCILER_ENABLED
              value: "false"
            - name: QUARKUS_OPERATOR_SDK_CONTROLLERS_CONSUMERPOLICYRECONCILER_ENABLED
              value: "false"
            - name: QUARKUS_OPERATOR_SDK_CONTROLLERS_KEY_ROTATION_CONTROLLER_ENABLED
              value: "false"
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 250m
              memory: 128Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
{{- end }}
