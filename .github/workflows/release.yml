name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      rebuild-version:
        description: 'Rebuild and push images from an existing git tag (e.g. 1.0.0). Skips semantic-release.'
        type: string
      promote-version:
        description: 'Promote existing GHCR images to Docker Hub (e.g. 1.2.0). Skips release and build.'
        type: string

env:
  MAVEN_OPTS: "-Dmaven.repo.local=${{ github.workspace }}/.m2/repository"
  REGISTRY: ghcr.io
  REGISTRY_GROUP: ${{ github.repository }}

permissions:
  contents: read

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      released: ${{ steps.semantic.outputs.released || steps.rebuild.outputs.released }}
      version: ${{ steps.semantic.outputs.version || steps.rebuild.outputs.version }}
      git-sha: ${{ steps.semantic.outputs.git-sha || steps.rebuild.outputs.git-sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve rebuild version
        id: rebuild
        if: inputs.rebuild-version != ''
        run: |
          echo "released=true" >> "$GITHUB_OUTPUT"
          echo "version=${{ inputs.rebuild-version }}" >> "$GITHUB_OUTPUT"
          echo "git-sha=$(git rev-parse v${{ inputs.rebuild-version }})" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        if: inputs.rebuild-version == ''
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"

      - name: Install dependencies
        if: inputs.rebuild-version == ''
        run: npm clean-install

      - name: Run semantic-release
        id: semantic
        if: inputs.rebuild-version == ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx semantic-release
          if [ -f .release-version ]; then
            echo "released=true" >> "$GITHUB_OUTPUT"
            echo "version=$(cat .release-version)" >> "$GITHUB_OUTPUT"
            echo "git-sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          fi

  build-ce-signing-proxy:
    name: Build ce-signing-proxy
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.outputs.released == 'true'
    permissions:
      contents: read
      packages: write
    container:
      image: maven:3.9.14-eclipse-temurin-21
    outputs:
      image: ${{ steps.image.outputs.image }}
      digest: ${{ steps.digest.outputs.digest }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: v${{ needs.release.outputs.version }}

      - name: Cache Maven repository
        uses: actions/cache@v5
        with:
          path: .m2/repository
          key: maven-cache-${{ hashFiles('**/pom.xml') }}
          restore-keys: maven-cache-

      - name: Build and push ce-signing-proxy
        run: >
          mvn -B package -pl ce-signing-proxy -am
          -DskipTests
          -Dquarkus.container-image.build=true
          -Dquarkus.container-image.push=true
          -Dquarkus.container-image.registry=${{ env.REGISTRY }}
          -Dquarkus.container-image.group=${{ env.REGISTRY_GROUP }}
          -Dquarkus.container-image.name=ce-signing-proxy
          -Dquarkus.container-image.tag=${{ needs.release.outputs.version }}
          -Dquarkus.container-image.additional-tags=latest,${{ needs.release.outputs.git-sha }}
          -Dquarkus.container-image.username=${{ github.actor }}
          -Dquarkus.container-image.password=${{ secrets.GITHUB_TOKEN }}

      - name: Output image name
        id: image
        run: echo "image=${{ env.REGISTRY }}/${{ env.REGISTRY_GROUP }}/ce-signing-proxy" >> "$GITHUB_OUTPUT"

      - name: Output image digest
        id: digest
        run: echo "digest=$(cat ce-signing-proxy/target/jib-image.digest)" >> "$GITHUB_OUTPUT"

  build-ce-signing-operator:
    name: Build ce-signing-operator
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.outputs.released == 'true'
    permissions:
      contents: read
      packages: write
    container:
      image: maven:3.9.14-eclipse-temurin-21
    outputs:
      image: ${{ steps.image.outputs.image }}
      digest: ${{ steps.digest.outputs.digest }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: v${{ needs.release.outputs.version }}

      - name: Cache Maven repository
        uses: actions/cache@v5
        with:
          path: .m2/repository
          key: maven-cache-${{ hashFiles('**/pom.xml') }}
          restore-keys: maven-cache-

      - name: Build and push ce-signing-operator
        run: >
          mvn -B package -pl ce-signing-operator -am
          -DskipTests
          -Dquarkus.container-image.build=true
          -Dquarkus.container-image.push=true
          -Dquarkus.container-image.registry=${{ env.REGISTRY }}
          -Dquarkus.container-image.group=${{ env.REGISTRY_GROUP }}
          -Dquarkus.container-image.name=ce-signing-operator
          -Dquarkus.container-image.tag=${{ needs.release.outputs.version }}
          -Dquarkus.container-image.additional-tags=latest,${{ needs.release.outputs.git-sha }}
          -Dquarkus.container-image.username=${{ github.actor }}
          -Dquarkus.container-image.password=${{ secrets.GITHUB_TOKEN }}

      - name: Output image name
        id: image
        run: echo "image=${{ env.REGISTRY }}/${{ env.REGISTRY_GROUP }}/ce-signing-operator" >> "$GITHUB_OUTPUT"

      - name: Output image digest
        id: digest
        run: echo "digest=$(cat ce-signing-operator/target/jib-image.digest)" >> "$GITHUB_OUTPUT"

      - name: Upload Helm chart artifact
        uses: actions/upload-artifact@v7
        with:
          name: helm-chart
          path: ce-signing-operator/charts/ce-signing-operator/

  provenance-ce-signing-proxy:
    needs: build-ce-signing-proxy
    permissions:
      actions: read
      id-token: write
      packages: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.1.0
    with:
      image: ${{ needs.build-ce-signing-proxy.outputs.image }}
      digest: ${{ needs.build-ce-signing-proxy.outputs.digest }}
      registry-username: ${{ github.actor }}
    secrets:
      registry-password: ${{ secrets.GITHUB_TOKEN }}

  provenance-ce-signing-operator:
    needs: build-ce-signing-operator
    permissions:
      actions: read
      id-token: write
      packages: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.1.0
    with:
      image: ${{ needs.build-ce-signing-operator.outputs.image }}
      digest: ${{ needs.build-ce-signing-operator.outputs.digest }}
      registry-username: ${{ github.actor }}
    secrets:
      registry-password: ${{ secrets.GITHUB_TOKEN }}

  promote-to-dockerhub:
    name: Promote images to Docker Hub
    runs-on: ubuntu-latest
    needs: [release, build-ce-signing-proxy, build-ce-signing-operator]
    if: |
      !cancelled() &&
      (needs.release.outputs.released == 'true' || inputs.promote-version != '')
    env:
      PROMOTE_VERSION: ${{ needs.release.outputs.version || inputs.promote-version }}
    steps:
      - name: Install crane
        uses: imjasonh/setup-crane@v0.5

      - name: Login to GHCR
        run: crane auth login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        run: crane auth login docker.io -u ${{ secrets.DOCKERHUB_USERNAME }} -p ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Copy ce-signing-proxy
        run: |
          crane copy \
            ${{ env.REGISTRY }}/${{ env.REGISTRY_GROUP }}/ce-signing-proxy:${{ env.PROMOTE_VERSION }} \
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/ce-signing-proxy:${{ env.PROMOTE_VERSION }}
          crane copy \
            ${{ env.REGISTRY }}/${{ env.REGISTRY_GROUP }}/ce-signing-proxy:${{ env.PROMOTE_VERSION }} \
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/ce-signing-proxy:latest

      - name: Copy ce-signing-operator
        run: |
          crane copy \
            ${{ env.REGISTRY }}/${{ env.REGISTRY_GROUP }}/ce-signing-operator:${{ env.PROMOTE_VERSION }} \
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/ce-signing-operator:${{ env.PROMOTE_VERSION }}
          crane copy \
            ${{ env.REGISTRY }}/${{ env.REGISTRY_GROUP }}/ce-signing-operator:${{ env.PROMOTE_VERSION }} \
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/ce-signing-operator:latest

  update-release-notes:
    name: Update release notes
    runs-on: ubuntu-latest
    needs: [release, build-ce-signing-proxy, build-ce-signing-operator]
    permissions:
      contents: write
    steps:
      - name: Append container images to release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.release.outputs.version }}"
          PROXY_IMAGE="${{ needs.build-ce-signing-proxy.outputs.image }}"
          PROXY_DIGEST="${{ needs.build-ce-signing-proxy.outputs.digest }}"
          OPERATOR_IMAGE="${{ needs.build-ce-signing-operator.outputs.image }}"
          OPERATOR_DIGEST="${{ needs.build-ce-signing-operator.outputs.digest }}"

          gh release view "v${VERSION}" --repo "${{ github.repository }}" --json body -q .body > body.md

          cat >> body.md <<EOF

          ## Container Images

          \`\`\`
          docker pull ${PROXY_IMAGE}:${VERSION}@${PROXY_DIGEST}
          docker pull ${OPERATOR_IMAGE}:${VERSION}@${OPERATOR_DIGEST}
          \`\`\`

          ## Helm Chart

          \`\`\`bash
          helm install ce-signing-operator oci://${{ env.REGISTRY }}/${{ env.REGISTRY_GROUP }}/ce-signing-operator --version ${VERSION}
          \`\`\`
          EOF

          gh release edit "v${VERSION}" --repo "${{ github.repository }}" --notes-file body.md

  publish-helm-chart:
    name: Publish Helm chart
    runs-on: ubuntu-latest
    needs: [release, build-ce-signing-operator]
    permissions:
      packages: write
    container:
      image: alpine/helm:3.20.2
    steps:
      - name: Download Helm chart artifact
        uses: actions/download-artifact@v8
        with:
          name: helm-chart
          path: ce-signing-operator/

      - name: Login to Helm registry
        run: helm registry login ${{ env.REGISTRY }} -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}

      - name: Package Helm chart
        run: helm package ce-signing-operator/ --version ${{ needs.release.outputs.version }} --app-version ${{ needs.release.outputs.version }}

      - name: Push Helm chart
        run: helm push ce-signing-operator-${{ needs.release.outputs.version }}.tgz oci://${{ env.REGISTRY }}/${{ env.REGISTRY_GROUP }}
